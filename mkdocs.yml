site_name: LLM Inference
site_description: A blog about LLM inference, quantization, and other technical topics
site_author: Ayoub

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Light mode
    - scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: dark-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.integrate

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: full
      post_url_format: "{slug}"
      authors_file: blog/.authors.yml
      archive: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Blog: blog/index.md
  - About: about.md

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/external-links.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AyoubMDL
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ayoub-bih/
      name: LinkedIn
