{% extends "base.html" %}

{% block extrahead %}
  {% if page and page.meta and page.meta.image %}
    <meta property="og:image" content="{{ config.site_url }}{{ page.meta.image }}" />
  {% endif %}
  {% if page and page.meta and page.meta.social_title %}
    <meta property="og:title" content="{{ page.meta.social_title }}" />
    <meta name="twitter:title" content="{{ page.meta.social_title }}" />
  {% endif %}
{% endblock %}
